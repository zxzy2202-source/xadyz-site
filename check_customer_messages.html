<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>客户留言查看器 - 志信纸业</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    .header {
      background: white;
      padding: 30px;
      border-radius: 12px;
      margin-bottom: 30px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 {
      font-size: 28px;
      color: #1a1a1a;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #666;
      font-size: 14px;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .stat-label {
      font-size: 14px;
      color: #666;
      margin-bottom: 8px;
    }
    .stat-value {
      font-size: 32px;
      font-weight: bold;
      color: #1a1a1a;
    }
    .stat-value.blue { color: #3b82f6; }
    .stat-value.yellow { color: #f59e0b; }
    .stat-value.green { color: #10b981; }
    .stat-value.purple { color: #8b5cf6; }
    
    .leads-container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      overflow: hidden;
    }
    .leads-header {
      padding: 20px 30px;
      border-bottom: 1px solid #e5e5e5;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .leads-title {
      font-size: 20px;
      font-weight: 600;
      color: #1a1a1a;
    }
    .refresh-btn {
      padding: 8px 16px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }
    .refresh-btn:hover {
      background: #2563eb;
    }
    .lead-item {
      padding: 24px 30px;
      border-bottom: 1px solid #f0f0f0;
    }
    .lead-item:last-child {
      border-bottom: none;
    }
    .lead-item:hover {
      background: #fafafa;
    }
    .lead-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
    }
    .lead-name {
      font-size: 18px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 12px;
    }
    .badges {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }
    .badge.contact { background: #dbeafe; color: #1e40af; }
    .badge.tender { background: #fed7aa; color: #9a3412; }
    .badge.new { background: #dbeafe; color: #1e40af; }
    .badge.contacted { background: #fef3c7; color: #92400e; }
    .badge.qualified { background: #d1fae5; color: #065f46; }
    .badge.won { background: #e9d5ff; color: #6b21a8; }
    .badge.lost { background: #f3f4f6; color: #374151; }
    .badge.level-a { background: #fee2e2; color: #991b1b; font-weight: bold; }
    .badge.level-b { background: #fed7aa; color: #9a3412; font-weight: bold; }
    .badge.level-c { background: #f3f4f6; color: #374151; font-weight: bold; }
    
    .lead-info {
      font-size: 14px;
      color: #666;
      line-height: 1.8;
    }
    .lead-info div {
      margin-bottom: 4px;
    }
    .lead-time {
      text-align: right;
      font-size: 13px;
      color: #999;
    }
    .lead-message {
      margin-top: 16px;
      padding: 16px;
      background: #f9fafb;
      border-radius: 8px;
      border-left: 3px solid #3b82f6;
    }
    .message-label {
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 8px;
    }
    .message-content {
      font-size: 14px;
      color: #1a1a1a;
      line-height: 1.6;
      white-space: pre-wrap;
    }
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: #666;
    }
    .spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #3b82f6;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: #999;
    }
    .error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #991b1b;
      padding: 20px;
      border-radius: 8px;
      margin: 20px 0;
    }
    .admin-link {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 24px;
      background: #3b82f6;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 500;
    }
    .admin-link:hover {
      background: #2563eb;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📨 客户留言查看器</h1>
      <p class="subtitle">志信纸业 B2B 独立站 - xadyz.com</p>
    </div>

    <div id="stats" class="stats"></div>
    
    <div class="leads-container">
      <div class="leads-header">
        <div class="leads-title">所有留言</div>
        <button class="refresh-btn" onclick="loadLeads()">🔄 刷新</button>
      </div>
      <div id="leads-list"></div>
    </div>

    <div style="text-align: center; margin-top: 30px;">
      <a href="/admin" class="admin-link">🔐 进入完整后台管理系统</a>
    </div>
  </div>

  <script>
    // Supabase配置
    const SUPABASE_URL = 'https://dpitlvjqgoixfozdpkji.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRwaXRsdmpxZ29peGZvemRwa2ppIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAwODIxNjUsImV4cCI6MjA4NTY1ODE2NX0.u3w3KFT5jXzDBBKfyFRiT_wduab0a1GYNxLXUyfknbg';
    
    const { createClient } = supabase;
    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);

    // 状态标签映射
    const statusLabels = {
      new: '新线索',
      contacted: '已联系',
      qualified: '已确认',
      proposal: '方案中',
      negotiation: '洽谈中',
      won: '已成交',
      lost: '已失效'
    };

    const typeLabels = {
      contact: '咨询',
      tender: '招标',
      distributor: '经销',
      oem: 'OEM',
      inquiry: '询价'
    };

    // 格式化日期
    function formatDate(dateString) {
      const date = new Date(dateString);
      return date.toLocaleString('zh-CN', {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    // 加载留言数据
    async function loadLeads() {
      const statsDiv = document.getElementById('stats');
      const leadsDiv = document.getElementById('leads-list');
      
      leadsDiv.innerHTML = '<div class="loading"><div class="spinner"></div><p>加载中...</p></div>';

      try {
        const { data, error } = await supabaseClient
          .from('leads')
          .select('*')
          .order('created_at', { ascending: false });

        if (error) throw error;

        const leads = data || [];

        // 计算统计数据
        const stats = {
          total: leads.length,
          new: leads.filter(l => l.status === 'new').length,
          contacted: leads.filter(l => l.status === 'contacted').length,
          qualified: leads.filter(l => l.status === 'qualified').length
        };

        // 渲染统计卡片
        statsDiv.innerHTML = `
          <div class="stat-card">
            <div class="stat-label">总留言数</div>
            <div class="stat-value">${stats.total}</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">新线索</div>
            <div class="stat-value blue">${stats.new}</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">已联系</div>
            <div class="stat-value yellow">${stats.contacted}</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">已确认</div>
            <div class="stat-value green">${stats.qualified}</div>
          </div>
        `;

        // 渲染留言列表
        if (leads.length === 0) {
          leadsDiv.innerHTML = '<div class="empty">暂无客户留言</div>';
          return;
        }

        leadsDiv.innerHTML = leads.map(lead => `
          <div class="lead-item">
            <div class="lead-header">
              <div style="flex: 1;">
                <div class="lead-name">${lead.contact_name || lead.company_name}</div>
                <div class="badges">
                  <span class="badge ${lead.lead_type}">${typeLabels[lead.lead_type] || lead.lead_type}</span>
                  <span class="badge ${lead.status}">${statusLabels[lead.status] || lead.status}</span>
                  ${lead.lead_level ? `<span class="badge level-${lead.lead_level.toLowerCase()}">${lead.lead_level}级</span>` : ''}
                </div>
                <div class="lead-info">
                  <div>📧 ${lead.email}</div>
                  ${lead.company_name ? `<div>🏢 ${lead.company_name}</div>` : ''}
                  ${lead.country ? `<div>🌍 ${lead.country}</div>` : ''}
                  ${lead.phone ? `<div>📱 ${lead.phone}</div>` : ''}
                  ${lead.product_interest ? `<div>📦 产品兴趣: ${lead.product_interest}</div>` : ''}
                  ${lead.estimated_value ? `<div>💰 预估价值: $${lead.estimated_value.toLocaleString()}</div>` : ''}
                </div>
              </div>
              <div class="lead-time">
                ${formatDate(lead.created_at)}
              </div>
            </div>
            ${lead.notes ? `
              <div class="lead-message">
                <div class="message-label">留言内容:</div>
                <div class="message-content">${lead.notes}</div>
              </div>
            ` : ''}
          </div>
        `).join('');

      } catch (error) {
        console.error('Error:', error);
        leadsDiv.innerHTML = `
          <div class="error">
            <h3 style="margin-bottom: 10px;">❌ 加载失败</h3>
            <p>${error.message}</p>
            <p style="margin-top: 10px; font-size: 13px;">请检查网络连接或联系技术支持</p>
          </div>
        `;
      }
    }

    // 页面加载时自动执行
    window.addEventListener('load', loadLeads);
  </script>
</body>
</html>
